name: Update Homebrew
on:
  release:
    types: [published]
jobs:
  homebrew:
    runs-on: ubuntu-latest
    steps:
      - name: Update Homebrew formula
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          TAG="${GITHUB_REF_NAME}"
          SHA=$(curl -sL "https://github.com/${{ github.repository }}/archive/refs/tags/${TAG}.tar.gz" | shasum -a 256 | cut -d' ' -f1)

          git clone "https://x-access-token:${GH_TOKEN}@github.com/maxgfr/homebrew-tap.git" tap
          cd tap

          cat > Formula/snatch.rb << FORMULA
          class Snatch < Formula
            desc "Universal video downloader - yt-dlp + CDP browser fallback"
            homepage "https://github.com/maxgfr/snatch"
            url "https://github.com/maxgfr/snatch/archive/refs/tags/${TAG}.tar.gz"
            version "${TAG}"
            sha256 "${SHA}"
            license "MIT"

            depends_on "yt-dlp"
            depends_on "ffmpeg"
            depends_on "fnm"
            depends_on "node"

            def install
              bin.install "download.sh" => "snatch"
              libexec.install "extract_video_url.mjs"
              libexec.install "package.json"
              system "npm", "install", "--prefix", libexec
              inreplace bin/"snatch", 'SCRIPT_DIR="\$(cd "\$(dirname "\$0")" && pwd)"', "SCRIPT_DIR=\"#{libexec}\""
            end

            test do
              assert_match "snatch", shell_output("#{bin}/snatch --version")
            end
          end
          FORMULA

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/snatch.rb
          git commit -m "snatch ${TAG}" || exit 0
          git push
